worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream identity_service {
        # host.docker.internal points to the host machine
        server host.docker.internal:8080 max_fails=3 fail_timeout=30s;
        server host.docker.internal:8081 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        # Identity Service Route
        location /identity/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bỏ qua lỗi favicon
        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
    }
}
