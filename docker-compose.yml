# http://192.168.1.8:8081/
# http://192.168.1.8:9100/metrics

services:
  db:
    image: mysql:8.0
    container_name: book_ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: book_ecommerce
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - book_network
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: book_ecommerce_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - book_network
    ports:
      - "8081:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: book_ecommerce_prometheus
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - book_network

  grafana:
    image: grafana/grafana:latest
    container_name: book_ecommerce_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - book_network
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.9.0
    container_name: book_ecommerce_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/observability/loki/loki-config.yaml:/etc/loki/local-config.yaml
    networks:
      - book_network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: book_ecommerce_promtail
    volumes:
      - ./identity-service/logs:/app/logs
      - ./docker/observability/promtail/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - book_network
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:latest
    container_name: book_ecommerce_tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./docker/observability/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
    networks:
      - book_network

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: book_ecommerce_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/observability/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "8889:8889"   # Prometheus exporter metrics
      - "4318:4318"   # OTLP http receiver
    networks:
      - book_network
    depends_on:
      - tempo
      - prometheus

  redis:
    image: redis:7-alpine
    container_name: book_ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - book_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: book_ecommerce_redisinsight
    ports:
      - "8001:5540"
    networks:
      - book_network
    depends_on:
      - redis

  node-exporter:
    image: prom/node-exporter:latest
    container_name: book_ecommerce_node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - book_network

  api-gateway:
    image: nginx:latest
    container_name: book_ecommerce_api_gateway
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - book_network
    depends_on:
      - db
      - redis

volumes:
  db_data:
  grafana_data:
  tempo_data:
  redis_data:
networks:
  book_network:
    driver: bridge
